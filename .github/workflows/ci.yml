name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore packages
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test tests/Unit/Unit.Tests.csproj --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults

      - name: Run integration tests
        run: dotnet test tests/Integration/Integration.Tests.csproj --no-build --configuration Release --verbosity normal --logger trx --results-directory TestResults
        env:
          Jwt__SecretKey: ci-test-secret-key-that-is-at-least-32-bytes

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx
