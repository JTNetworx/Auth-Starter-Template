name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version being published (e.g. 1.0.8)'
        required: true

jobs:
  publish:
    name: Pack and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack
        run: dotnet pack pack/template-pack.csproj -c Release -o ./release-artifacts

      - name: Push to NuGet
        run: |
          dotnet nuget push "release-artifacts/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nupkg
          path: release-artifacts/*.nupkg
